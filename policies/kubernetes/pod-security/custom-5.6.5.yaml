apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: custom-5.6.5
  annotations:
    policies.kyverno.io/category: CIS 5.6.5
    policies.kyverno.io/description: 'Validates private node configuration using
      reliable Kubernetes resources.

      Checks Services, Nodes, and Namespaces for private-node indicators consistent
      with GKE private cluster expectations.

      '
    policies.kyverno.io/cel: 'true'
spec:
  validationFailureAction: Audit
  background: true
  rules:
  - name: check-private-endpoint-namespace
    match:
      any:
      - resources:
          kinds:
          - Namespace
    validate:
      message: Namespace should have private endpoint annotation or label indicating
        proper network isolation.
      cel:
        expressions:
        - expression: |
            (has(object.metadata.annotations) && 'private-endpoint' in object.metadata.annotations && object.metadata.annotations['private-endpoint'] == 'enabled') ||
            (has(object.metadata.labels) && 'private-endpoint' in object.metadata.labels && object.metadata.labels['private-endpoint'] == 'enabled')
          message: Namespace should have private endpoint annotation or label indicating
            proper network isolation.
  - name: check-service-private-configuration
    match:
      any:
      - resources:
          kinds:
          - Service
    validate:
      message: Services should be configured for private access.
      cel:
        expressions:
        - expression: |
            (has(object.metadata.annotations) && 'networking.gke.io/load-balancer-type' in object.metadata.annotations && object.metadata.annotations['networking.gke.io/load-balancer-type'] == 'Internal') ||
            (has(object.metadata.annotations) && 'cloud.google.com/load-balancer-type' in object.metadata.annotations && object.metadata.annotations['cloud.google.com/load-balancer-type'] == 'Internal') ||
            (has(object.metadata.annotations) && 'private-endpoint' in object.metadata.annotations && object.metadata.annotations['private-endpoint'] == 'enabled') ||
            (object.spec.type == 'ClusterIP') ||
            (has(object.metadata.labels) && 'network-policy' in object.metadata.labels && object.metadata.labels['network-policy'] == 'private')
          message: Services should be configured for private access.
  - name: validate-node-private-networking
    match:
      any:
      - resources:
          kinds:
          - Node
    validate:
      message: Nodes should be configured for private networking.
      cel:
        expressions:
        - expression: |
            (has(object.metadata.labels) && 'private-subnet' in object.metadata.labels && object.metadata.labels['private-subnet'] == 'true') ||
            (has(object.metadata.annotations) && 'node.kubernetes.io/private-networking' in object.metadata.annotations && object.metadata.annotations['node.kubernetes.io/private-networking'] == 'enabled')
          message: Nodes should be configured for private networking.
  - name: validate-network-policy-private
    match:
      any:
      - resources:
          kinds:
          - NetworkPolicy
    validate:
      message: NetworkPolicies should enforce private communication.
      cel:
        expressions:
        - expression: |
            (has(object.metadata.annotations) && 'policy-type' in object.metadata.annotations && object.metadata.annotations['policy-type'] == 'private') ||
            (object.spec.policyTypes == ['Ingress', 'Egress'])
          message: NetworkPolicies should enforce private communication.
