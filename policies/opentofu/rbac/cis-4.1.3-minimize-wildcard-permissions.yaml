apiVersion: json.kyverno.io/v1alpha1
kind: ValidatingPolicy
metadata:
  name: cis-4-1-3-minimize-wildcard-permissions
spec:
  rules:
    - name: no-wildcard-iam-permissions
      assert:
        all:
          - message: "Custom IAM roles must not declare a wildcard ('*') permission."
            check:
              (length(planned_values.root_module.resources[?type=='google_project_iam_custom_role' && contains(values.permissions, '*')]) == `0`): true

          - message: "No project IAM binding may grant roles/owner (it is a wildcard at the project scope)."
            check:
              (length(planned_values.root_module.resources[?type=='google_project_iam_member' && values.role == 'roles/owner']) == `0`): true
