apiVersion: json.kyverno.io/v1alpha1
kind: ValidatingPolicy
metadata:
  name: cis-4-1-1-minimize-cluster-admin
spec:
  rules:
    - name: restrict-cluster-admin-iam
      assert:
        all:
          - message: "No project IAM binding may grant roles/owner."
            check:
              (length(planned_values.root_module.resources[?type=='google_project_iam_member' && values.role == 'roles/owner']) == `0`): true

          - message: "No project IAM binding may grant roles/editor (use predefined roles or custom least-privilege roles instead)."
            check:
              (length(planned_values.root_module.resources[?type=='google_project_iam_member' && values.role == 'roles/editor']) == `0`): true

          - message: "No project IAM binding may grant roles/container.admin on broad principals (it is GKE cluster-admin)."
            check:
              (length(planned_values.root_module.resources[?type=='google_project_iam_member' && values.role == 'roles/container.admin' && (values.member == 'allUsers' || values.member == 'allAuthenticatedUsers')]) == `0`): true

          - message: "Custom IAM roles must not include a wildcard ('*') permission."
            check:
              (length(planned_values.root_module.resources[?type=='google_project_iam_custom_role' && contains(values.permissions, '*')]) == `0`): true

          - message: "A dedicated node-pool google_service_account must exist (avoid the Compute Engine default SA)."
            check:
              (length(planned_values.root_module.resources[?type=='google_service_account' && (contains(values.account_id, 'node') || contains(values.account_id, 'gke'))]) > `0`): true
