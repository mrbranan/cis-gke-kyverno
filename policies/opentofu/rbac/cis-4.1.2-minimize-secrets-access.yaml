apiVersion: json.kyverno.io/v1alpha1
kind: ValidatingPolicy
metadata:
  name: cis-4-1-2-minimize-secrets-access
spec:
  rules:
    - name: restrict-secrets-access-iam
      assert:
        all:
          - message: "No project IAM binding may grant roles/secretmanager.admin to broad principals."
            check:
              (length(planned_values.root_module.resources[?type=='google_project_iam_member' && values.role == 'roles/secretmanager.admin' && (values.member == 'allUsers' || values.member == 'allAuthenticatedUsers')]) == `0`): true

          - message: "No project IAM binding may grant roles/secretmanager.admin in this stack (least privilege: secret accessor is sufficient for workloads)."
            check:
              (length(planned_values.root_module.resources[?type=='google_project_iam_member' && values.role == 'roles/secretmanager.admin']) == `0`): true

          - message: "Custom IAM roles must not contain wildcard secretmanager.* or top-level '*' permissions."
            check:
              (length(planned_values.root_module.resources[?type=='google_project_iam_custom_role' && (contains(values.permissions, 'secretmanager.*') || contains(values.permissions, '*'))]) == `0`): true
