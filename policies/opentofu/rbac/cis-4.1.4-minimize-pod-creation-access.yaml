apiVersion: json.kyverno.io/v1alpha1
kind: ValidatingPolicy
metadata:
  name: cis-4-1-4-minimize-pod-creation-access
spec:
  rules:
    - name: restrict-compute-permissions
      assert:
        all:
          - message: "Custom IAM roles must not include broad compute.instances.create or compute.* permissions (which can be used to pivot to node-level access)."
            check:
              (length(planned_values.root_module.resources[?type=='google_project_iam_custom_role' && (contains(values.permissions, 'compute.instances.create') || contains(values.permissions, 'compute.*') || contains(values.permissions, '*'))]) == `0`): true

          - message: "GKE node pools must use a dedicated google_service_account (not the Compute Engine default SA)."
            check:
              (length(planned_values.root_module.resources[?type=='google_container_node_pool' && length(values.node_config) > `0` && values.node_config[0].service_account != null && values.node_config[0].service_account != 'default']) > `0`): true
