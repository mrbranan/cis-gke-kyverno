apiVersion: json.kyverno.io/v1alpha1
kind: ValidatingPolicy
metadata:
  name: cis-2-1-2-audit-log-destinations
spec:
  rules:
    - name: gke-audit-log-destinations
      assert:
        all:
          - message: "GKE cluster logging_config.enable_components must include SYSTEM_COMPONENTS and WORKLOADS so audit events are emitted."
            check:
              (length(planned_values.root_module.resources[?type=='google_container_cluster' && length(values.logging_config) > `0` && contains(values.logging_config[0].enable_components, 'SYSTEM_COMPONENTS') && contains(values.logging_config[0].enable_components, 'WORKLOADS')]) > `0`): true

          - message: "Cluster audit logs must be routed to a centrally managed destination via a google_logging_project_sink."
            check:
              (length(planned_values.root_module.resources[?type=='google_logging_project_sink' && values.destination != null && values.destination != '']) > `0`): true

          - message: "The audit log sink filter must target Kubernetes cluster resources (resource.type=k8s_cluster)."
            check:
              (length(planned_values.root_module.resources[?type=='google_logging_project_sink' && contains(values.filter, 'resource.type=k8s_cluster')]) > `0`): true
