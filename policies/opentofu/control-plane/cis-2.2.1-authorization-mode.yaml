apiVersion: json.kyverno.io/v1alpha1
kind: ValidatingPolicy
metadata:
  name: cis-2-2-1-authorization-mode
spec:
  rules:
    - name: gke-rbac-authorization
      assert:
        all:
          - message: "GKE cluster must have enable_legacy_abac=false to enforce RBAC."
            check:
              (length(planned_values.root_module.resources[?type=='google_container_cluster' && values.enable_legacy_abac == `true`]) == `0`): true

          - message: "GKE cluster master_auth.client_certificate_config.issue_client_certificate must be false (legacy client-cert auth bypasses RBAC)."
            check:
              (length(planned_values.root_module.resources[?type=='google_container_cluster' && length(values.master_auth) > `0` && length(values.master_auth[0].client_certificate_config) > `0` && values.master_auth[0].client_certificate_config[0].issue_client_certificate == `true`]) == `0`): true

          - message: "Custom IAM roles must not declare wildcard ('*') permissions."
            check:
              (length(planned_values.root_module.resources[?type=='google_project_iam_custom_role' && contains(values.permissions, '*')]) == `0`): true

          - message: "Cluster identities (service accounts) must not be granted roles/owner at the project level."
            check:
              (length(planned_values.root_module.resources[?type=='google_project_iam_member' && values.role == 'roles/owner']) == `0`): true
