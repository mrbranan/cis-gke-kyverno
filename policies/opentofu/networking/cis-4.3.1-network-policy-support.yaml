apiVersion: json.kyverno.io/v1alpha1
kind: ValidatingPolicy
metadata:
  name: cis-4-3-1-network-policy-support
spec:
  rules:
    - name: gke-network-policy-support
      assert:
        all:
          - message: "GKE cluster must support NetworkPolicies: either network_policy.enabled=true with provider=CALICO, or datapath_provider=ADVANCED_DATAPATH (Dataplane V2)."
            check:
              (length(planned_values.root_module.resources[?type=='google_container_cluster' && length(values.network_policy) > `0` && values.network_policy[0].enabled == `true` && values.network_policy[0].provider == 'CALICO']) > `0` || length(planned_values.root_module.resources[?type=='google_container_cluster' && values.datapath_provider == 'ADVANCED_DATAPATH']) > `0`): true
