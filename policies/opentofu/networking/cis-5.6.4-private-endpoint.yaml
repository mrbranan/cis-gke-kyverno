apiVersion: json.kyverno.io/v1alpha1
kind: ValidatingPolicy
metadata:
  name: cis-5-6-4-private-endpoint
spec:
  rules:
    - name: gke-private-endpoint
      assert:
        all:
          - message: "GKE cluster must set private_cluster_config.enable_private_endpoint=true and enable_private_nodes=true."
            check:
              (length(planned_values.root_module.resources[?type=='google_container_cluster' && length(values.private_cluster_config) > `0` && values.private_cluster_config[0].enable_private_endpoint == `true` && values.private_cluster_config[0].enable_private_nodes == `true`]) > `0`): true

          - message: "GKE cluster must declare master_authorized_networks_config with at least one CIDR block."
            check:
              (length(planned_values.root_module.resources[?type=='google_container_cluster' && length(values.master_authorized_networks_config) > `0` && length(values.master_authorized_networks_config[0].cidr_blocks) > `0`]) > `0`): true
