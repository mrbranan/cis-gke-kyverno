apiVersion: json.kyverno.io/v1alpha1
kind: ValidatingPolicy
metadata:
  name: cis-5-10-1-application-secrets-encryption
spec:
  rules:
    - name: gke-application-layer-secrets-encryption
      assert:
        all:
          - message: "GKE cluster must enable application-layer Secrets encryption (database_encryption.state must be 'ENCRYPTED' with a Cloud KMS key_name)."
            check:
              (length(planned_values.root_module.resources[?type=='google_container_cluster' && length(values.database_encryption) > `0` && values.database_encryption[0].state == 'ENCRYPTED' && values.database_encryption[0].key_name != null && values.database_encryption[0].key_name != '']) > `0`): true
